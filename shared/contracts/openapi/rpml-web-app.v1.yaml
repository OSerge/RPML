openapi: 3.1.0
info:
  title: RPML Backend
  description: 'RPML Web App HTTP API (contract snapshot: shared/contracts/openapi/rpml-web-app.v1.yaml).'
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Проверка доступности API
      description: Технический эндпоинт для liveness-проверок и мониторинга.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Вход пользователя
      description: Проверяет email/пароль и возвращает JWT access token для защищенных
        эндпоинтов API.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверный email или пароль.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/dashboard:
    get:
      tags:
      - dashboard
      summary: Данные дашборда
      description: Возвращает агрегированные KPI, список долгов, актуальный сценарий
        и последний результат оптимизации для текущего пользователя.
      operationId: get_dashboard_api_v1_dashboard_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
  /api/v1/demo/seed:
    post:
      tags:
      - demo
      summary: Заполнить демо-данные
      description: Идемпотентно создает/обновляет демо-сценарий и связанные данные
        для текущего пользователя, чтобы можно было сразу запускать оптимизацию.
      operationId: post_demo_seed_api_v1_demo_seed_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Post Demo Seed Api V1 Demo Seed Post
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации демо-данных.
      security:
      - HTTPBearer: []
  /api/v1/debts/loan-types:
    get:
      tags:
      - debts
      summary: Справочник типов кредитов
      description: Возвращает список допустимых значений `loan_type` для операций
        создания/обновления долгов.
      operationId: list_loan_types_api_v1_debts_loan_types_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanTypeDirectory'
  /api/v1/debts:
    get:
      tags:
      - debts
      summary: Список долгов пользователя
      description: Возвращает все долги текущего аутентифицированного пользователя.
      operationId: list_debts_api_v1_debts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DebtRead'
                type: array
                title: Response List Debts Api V1 Debts Get
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
    post:
      tags:
      - debts
      summary: Создать долг
      description: Создает новый долг для текущего пользователя. Для последующего
        расчета оптимизации должны быть заполнены все числовые параметры долга.
      operationId: create_debt_api_v1_debts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebtCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации тела запроса.
      security:
      - HTTPBearer: []
  /api/v1/debts/{debt_id}:
    get:
      tags:
      - debts
      summary: Получить долг по ID
      description: Возвращает один долг текущего пользователя по идентификатору.
      operationId: get_debt_api_v1_debts__debt_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - debts
      summary: Обновить долг
      description: Частично обновляет поля долга по ID. Передаются только поля, которые
        нужно изменить.
      operationId: update_debt_api_v1_debts__debt_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebtUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Ошибка валидации тела запроса.
    delete:
      tags:
      - debts
      summary: Удалить долг
      description: Удаляет долг текущего пользователя по ID.
      operationId: delete_debt_api_v1_debts__debt_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/scenario/profile:
    get:
      tags:
      - scenario
      summary: Получить активный профиль дохода
      description: Возвращает текущий сценарный профиль дохода пользователя (последний
        по времени).
      operationId: get_profile_api_v1_scenario_profile_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioProfileResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Профиль не найден.
      security:
      - HTTPBearer: []
    put:
      tags:
      - scenario
      summary: Обновить профиль дохода
      description: Обновляет вектор доступного бюджета. Если профиль отсутствует,
        создается новый.
      operationId: upsert_profile_api_v1_scenario_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioProfileUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioProfileResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации.
      security:
      - HTTPBearer: []
  /api/v1/scenario/profile/estimate-available-budget:
    post:
      tags:
      - scenario
      summary: Оценить доступный бюджет на погашение
      description: Рассчитывает доступный бюджет как `(income - mandatory - variable)
        * (1 - safety_buffer_pct)` и записывает его как равномерный monthly_income_vector.
      operationId: estimate_available_budget_api_v1_scenario_profile_estimate_available_budget_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailableBudgetEstimateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableBudgetEstimateResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации.
      security:
      - HTTPBearer: []
  /api/v1/optimization/run:
    post:
      tags:
      - optimization
      summary: Синхронный запуск оптимизации
      description: Выполняет оптимизацию в рамках одного HTTP-запроса. Возвращает
        базовый план и, при `mc_income=true`, дополнительный Monte Carlo summary.
      operationId: run_optimization_sync_api_v1_optimization_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizationRunRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunResponse'
        '400':
          description: Bad Request
          $ref: '#/components/responses/ErrorContent'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Unprocessable Content
          $ref: '#/components/responses/ErrorContent'
      security:
      - HTTPBearer: []
  /api/v1/optimization/tasks:
    post:
      tags:
      - optimization
      summary: Создать асинхронную задачу оптимизации
      description: Ставит расчет в очередь Celery и сразу возвращает task_id.
      operationId: create_optimization_task_api_v1_optimization_tasks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOptimizationTaskRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOptimizationTaskResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Unprocessable Content
          $ref: '#/components/responses/ErrorContent'
      security:
      - HTTPBearer: []
  /api/v1/optimization/tasks/{task_id}:
    get:
      tags:
      - optimization
      summary: Статус асинхронной задачи оптимизации
      description: Возвращает текущий статус задачи. При completed в ответе присутствует
        `plan_id`, который можно запросить через `/optimization/plans/{plan_id}`.
      operationId: get_optimization_task_status_api_v1_optimization_tasks__task_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationTaskStatusResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          $ref: '#/components/responses/ErrorContent'
          description: Not Found
        '422':
          $ref: '#/components/responses/ErrorContent'
          description: Unprocessable Content
  /api/v1/optimization/plans/{plan_id}:
    get:
      tags:
      - optimization
      summary: Получить асинхронный план по ID
      description: Возвращает результат расчета, ранее завершенного через `/optimization/tasks`.
      operationId: get_optimization_plan_api_v1_optimization_plans__plan_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationPlanResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          $ref: '#/components/responses/ErrorContent'
          description: Not Found
        '422':
          $ref: '#/components/responses/ErrorContent'
          description: Unprocessable Content
components:
  schemas:
    AvailableBudgetEstimateRequest:
      properties:
        horizon_months:
          type: integer
          maximum: 240.0
          minimum: 1.0
          title: Horizon Months
          description: Горизонт планирования в месяцах.
        monthly_income:
          type: number
          minimum: 0.0
          title: Monthly Income
          description: Средний месячный доход пользователя.
        mandatory_expenses:
          type: number
          minimum: 0.0
          title: Mandatory Expenses
          description: Обязательные ежемесячные расходы.
        variable_expenses:
          type: number
          minimum: 0.0
          title: Variable Expenses
          description: Прочие переменные ежемесячные расходы.
          default: 0
        safety_buffer_pct:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Safety Buffer Pct
          description: Доля защитного буфера (0..1), не направляемая в погашение.
          default: 0.1
      type: object
      required:
      - horizon_months
      - monthly_income
      - mandatory_expenses
      title: AvailableBudgetEstimateRequest
    AvailableBudgetEstimateResponse:
      properties:
        monthly_available_budget:
          type: number
          title: Monthly Available Budget
        scenario_profile:
          $ref: '#/components/schemas/ScenarioProfileResponse'
      type: object
      required:
      - monthly_available_budget
      - scenario_profile
      title: AvailableBudgetEstimateResponse
    CreateOptimizationTaskRequest:
      properties:
        horizon_months:
          type: integer
          maximum: 240.0
          minimum: 1.0
          title: Horizon Months
          description: Горизонт планирования в месяцах.
        ru_mode:
          type: boolean
          title: Ru Mode
          description: Если true, применяются правила RU-режима.
          default: true
        mc_income:
          type: boolean
          title: Mc Income
          description: Если true, в фоне будет рассчитан Monte Carlo summary.
          default: false
      type: object
      required:
      - horizon_months
      title: CreateOptimizationTaskRequest
    CreateOptimizationTaskResponse:
      properties:
        task_id:
          type: string
          title: Task Id
          description: Идентификатор асинхронной задачи.
        status:
          type: string
          const: pending
          title: Status
          default: pending
        ru_mode:
          type: boolean
          title: Ru Mode
          description: RU-режим, зафиксированный в задаче.
        mc_income:
          type: boolean
          title: Mc Income
          description: MC-режим, зафиксированный в задаче.
      type: object
      required:
      - task_id
      - ru_mode
      - mc_income
      title: CreateOptimizationTaskResponse
    DashboardKpis:
      properties:
        total_principal:
          type: number
          title: Total Principal
        monthly_required_payment:
          type: number
          title: Monthly Required Payment
        active_debts:
          type: integer
          title: Active Debts
        last_run_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Run Status
      type: object
      required:
      - total_principal
      - monthly_required_payment
      - active_debts
      title: DashboardKpis
    DashboardResponse:
      properties:
        kpis:
          $ref: '#/components/schemas/DashboardKpis'
        debts:
          items:
            $ref: '#/components/schemas/DebtRead'
          type: array
          title: Debts
        baseline_reference:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Baseline Reference
        last_optimization:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Last Optimization
        scenario:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Scenario
      type: object
      required:
      - kpis
      - debts
      title: DashboardResponse
    DebtCreate:
      properties:
        name:
          type: string
          maxLength: 255
          minLength: 1
          title: Name
          description: Название кредита/долга в пользовательском интерфейсе.
        loan_type:
          $ref: '#/components/schemas/LoanType'
          description: Тип кредита (влияет на канонический порядок в RPML instance).
        principal:
          anyOf:
          - type: number
          - type: 'null'
          title: Principal
          description: Текущий остаток основного долга.
        fixed_payment:
          anyOf:
          - type: number
          - type: 'null'
          title: Fixed Payment
          description: Фиксированный обязательный платеж в месяц.
        min_payment_pct:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Payment Pct
          description: Минимальный платеж как доля от остатка (0..1).
        prepay_penalty:
          anyOf:
          - type: number
          - type: 'null'
          title: Prepay Penalty
          description: Штраф за досрочное погашение.
        interest_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Interest Rate Monthly
          description: Процентная ставка в месяц.
        default_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Default Rate Monthly
          description: Ставка штрафа/просрочки в месяц.
        stipulated_amount:
          anyOf:
          - type: number
          - type: 'null'
          title: Stipulated Amount
          description: Договорная сумма платежа (stated monthly amount).
        release_time:
          anyOf:
          - type: integer
          - type: 'null'
          title: Release Time
          description: Месяц выдачи кредита (0-indexed).
      type: object
      required:
      - name
      - loan_type
      title: DebtCreate
    DebtRead:
      properties:
        id:
          type: integer
          title: Id
          description: Идентификатор записи долга.
        user_id:
          type: integer
          title: User Id
          description: Владелец долга.
        name:
          type: string
          title: Name
          description: Название долга.
        loan_type:
          anyOf:
          - $ref: '#/components/schemas/LoanType'
          - type: 'null'
          description: Тип кредита.
        principal:
          anyOf:
          - type: number
          - type: 'null'
          title: Principal
          description: Остаток основного долга.
        fixed_payment:
          anyOf:
          - type: number
          - type: 'null'
          title: Fixed Payment
          description: Фиксированный месячный платеж.
        min_payment_pct:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Payment Pct
          description: Минимальный платеж в долях.
        prepay_penalty:
          anyOf:
          - type: number
          - type: 'null'
          title: Prepay Penalty
          description: Штраф за досрочное погашение.
        interest_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Interest Rate Monthly
          description: Процентная ставка в месяц.
        default_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Default Rate Monthly
          description: Ставка штрафа в месяц.
        stipulated_amount:
          anyOf:
          - type: number
          - type: 'null'
          title: Stipulated Amount
          description: Договорная сумма платежа.
        release_time:
          anyOf:
          - type: integer
          - type: 'null'
          title: Release Time
          description: Месяц выдачи (0-indexed).
      type: object
      required:
      - id
      - user_id
      - name
      title: DebtRead
    DebtUpdate:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 255
            minLength: 1
          - type: 'null'
          title: Name
          description: Новое название кредита/долга.
        loan_type:
          anyOf:
          - $ref: '#/components/schemas/LoanType'
          - type: 'null'
          description: Новый тип кредита.
        principal:
          anyOf:
          - type: number
          - type: 'null'
          title: Principal
          description: Новый остаток долга.
        fixed_payment:
          anyOf:
          - type: number
          - type: 'null'
          title: Fixed Payment
          description: Новый фиксированный платеж.
        min_payment_pct:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Payment Pct
          description: Новый min payment в долях.
        prepay_penalty:
          anyOf:
          - type: number
          - type: 'null'
          title: Prepay Penalty
          description: Новый штраф за досрочное погашение.
        interest_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Interest Rate Monthly
          description: Новая ставка в месяц.
        default_rate_monthly:
          anyOf:
          - type: number
          - type: 'null'
          title: Default Rate Monthly
          description: Новая штрафная ставка в месяц.
        stipulated_amount:
          anyOf:
          - type: number
          - type: 'null'
          title: Stipulated Amount
          description: Новая договорная сумма платежа.
        release_time:
          anyOf:
          - type: integer
          - type: 'null'
          title: Release Time
          description: Новый месяц выдачи (0-indexed).
      type: object
      title: DebtUpdate
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LoanType:
      type: string
      enum:
      - car_loan
      - house_loan
      - credit_card
      - bank_loan
      title: LoanType
    LoanTypeDirectory:
      properties:
        supported_values:
          items:
            type: string
          type: array
          title: Supported Values
          description: Список поддерживаемых значений loan_type.
      type: object
      title: LoanTypeDirectory
    OptimizationPlanResponse:
      properties:
        status:
