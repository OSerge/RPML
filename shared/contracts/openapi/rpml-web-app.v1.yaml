openapi: 3.1.0
info:
  title: RPML Backend
  description: 'RPML Web App HTTP API (contract snapshot: shared/contracts/openapi/rpml-web-app.v1.yaml).'
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Проверка доступности API
      description: Технический эндпоинт для liveness-проверок и мониторинга.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Health Get
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Вход пользователя
      description: Проверяет email/пароль и возвращает JWT access token для защищенных
        эндпоинтов API.
      operationId: login_api_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверный email или пароль.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/dashboard:
    get:
      tags:
      - dashboard
      summary: Данные дашборда
      description: Возвращает агрегированные KPI, список долгов, актуальный сценарий
        и последний результат оптимизации для текущего пользователя.
      operationId: get_dashboard_api_v1_dashboard_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
  /api/v1/demo/seed:
    post:
      tags:
      - demo
      summary: Заполнить демо-данные
      description: Идемпотентно создает/обновляет демо-сценарий и связанные данные
        для текущего пользователя, чтобы можно было сразу запускать оптимизацию.
      operationId: post_demo_seed_api_v1_demo_seed_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/DemoSeedRequest'
              - type: 'null'
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSeedResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации демо-данных.
      security:
      - HTTPBearer: []
  /api/v1/demo/instances:
    get:
      tags:
      - demo
      summary: Список доступных demo-инстансов
      description: Возвращает каталог bundled demo-сценариев из `core/rpml/result_samples`,
        которые можно загрузить через `/api/v1/demo/seed`.
      operationId: get_demo_instances_api_v1_demo_instances_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DemoInstanceSummary'
                type: array
                title: Response Get Demo Instances Api V1 Demo Instances Get
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
  /api/v1/demo/runs/{run_id}/top-savings:
    get:
      tags:
      - demo
      summary: Топ инстансов по экономии MILP
      description: Читает checkpoint эксперимента run и возвращает top-N инстансов
        по процентной экономии MILP относительно Avalanche или Snowball.
      operationId: get_demo_run_top_savings_api_v1_demo_runs__run_id__top_savings_get
      security:
      - HTTPBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          title: Run Id
      - name: metric
        in: query
        required: false
        schema:
          enum:
          - avalanche
          - snowball
          type: string
          description: Базовая стратегия для сравнения.
          default: avalanche
          title: Metric
        description: Базовая стратегия для сравнения.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Количество строк в топе.
          default: 10
          title: Limit
        description: Количество строк в топе.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoRunTopSavingsResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Run/checkpoint не найден.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/debts/loan-types:
    get:
      tags:
      - debts
      summary: Справочник типов кредитов
      description: Возвращает список допустимых значений `loan_type` для операций
        создания/обновления долгов.
      operationId: list_loan_types_api_v1_debts_loan_types_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoanTypeDirectory'
  /api/v1/debts:
    get:
      tags:
      - debts
      summary: Список долгов пользователя
      description: Возвращает все долги текущего аутентифицированного пользователя.
      operationId: list_debts_api_v1_debts_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/DebtRead'
                type: array
                title: Response List Debts Api V1 Debts Get
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
    post:
      tags:
      - debts
      summary: Создать долг
      description: Создает новый долг для текущего пользователя. Для последующего
        расчета оптимизации должны быть заполнены все числовые параметры долга.
      operationId: create_debt_api_v1_debts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebtCreate'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации тела запроса.
      security:
      - HTTPBearer: []
  /api/v1/debts/{debt_id}:
    get:
      tags:
      - debts
      summary: Получить долг по ID
      description: Возвращает один долг текущего пользователя по идентификатору.
      operationId: get_debt_api_v1_debts__debt_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - debts
      summary: Обновить долг
      description: Частично обновляет поля долга по ID. Передаются только поля, которые
        нужно изменить.
      operationId: update_debt_api_v1_debts__debt_id__patch
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebtUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtRead'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Ошибка валидации тела запроса.
    delete:
      tags:
      - debts
      summary: Удалить долг
      description: Удаляет долг текущего пользователя по ID.
      operationId: delete_debt_api_v1_debts__debt_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: debt_id
        in: path
        required: true
        schema:
          type: integer
          title: Debt Id
      responses:
        '204':
          description: Successful Response
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Долг не найден.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/scenario/profile:
    get:
      tags:
      - scenario
      summary: Получить активный профиль дохода
      description: Возвращает текущий сценарный профиль дохода пользователя (последний
        по времени).
      operationId: get_profile_api_v1_scenario_profile_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioProfileResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          description: Профиль не найден.
      security:
      - HTTPBearer: []
    put:
      tags:
      - scenario
      summary: Обновить профиль дохода
      description: Обновляет вектор доступного бюджета. Если профиль отсутствует,
        создается новый.
      operationId: upsert_profile_api_v1_scenario_profile_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioProfileUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioProfileResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации.
      security:
      - HTTPBearer: []
  /api/v1/scenario/profile/estimate-available-budget:
    post:
      tags:
      - scenario
      summary: Оценить доступный бюджет на погашение
      description: Рассчитывает доступный бюджет как `(income - mandatory - variable)
        * (1 - safety_buffer_pct)` и записывает его как равномерный monthly_income_vector.
      operationId: estimate_available_budget_api_v1_scenario_profile_estimate_available_budget_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvailableBudgetEstimateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableBudgetEstimateResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Ошибка валидации.
      security:
      - HTTPBearer: []
  /api/v1/optimization/instances:
    get:
      tags:
      - optimization
      summary: Каталог dataset-инстансов
      description: Возвращает все доступные `.dat` инстансы из bundled Rios-Solis
        dataset.
      operationId: get_dataset_instance_catalog_api_v1_optimization_instances_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetInstanceCatalogResponse'
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
  /api/v1/optimization/mc-config/defaults:
    get:
      tags:
      - optimization
      summary: Дефолтные параметры Monte Carlo
      description: Возвращает дефолтную конфигурацию модели стохастических траекторий
        дохода.
      operationId: get_monte_carlo_defaults_api_v1_optimization_mc_config_defaults_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationMonteCarloConfig'
        '401':
          description: Пользователь не аутентифицирован.
      security:
      - HTTPBearer: []
  /api/v1/optimization/run:
    post:
      tags:
      - optimization
      summary: Синхронный запуск оптимизации
      description: Выполняет оптимизацию в рамках одного HTTP-запроса. Возвращает
        базовый план и, при `mc_income=true`, дополнительный Monte Carlo summary.
      operationId: run_optimization_sync_api_v1_optimization_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OptimizationRunRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunResponse'
        '400':
          description: Bad Request
          $ref: '#/components/responses/ErrorContent'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Unprocessable Content
          $ref: '#/components/responses/ErrorContent'
      security:
      - HTTPBearer: []
  /api/v1/optimization/tasks:
    post:
      tags:
      - optimization
      summary: Создать асинхронную задачу оптимизации
      description: Ставит расчет в очередь Celery и сразу возвращает task_id.
      operationId: create_optimization_task_api_v1_optimization_tasks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOptimizationTaskRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOptimizationTaskResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '422':
          description: Unprocessable Content
          $ref: '#/components/responses/ErrorContent'
      security:
      - HTTPBearer: []
  /api/v1/optimization/tasks/{task_id}:
    get:
      tags:
      - optimization
      summary: Статус асинхронной задачи оптимизации
      description: Возвращает текущий статус задачи. При completed в ответе присутствует
        `plan_id`, который можно запросить через `/optimization/plans/{plan_id}`.
      operationId: get_optimization_task_status_api_v1_optimization_tasks__task_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: task_id
        in: path
        required: true
        schema:
          type: string
          title: Task Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationTaskStatusResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          $ref: '#/components/responses/ErrorContent'
          description: Not Found
        '422':
          $ref: '#/components/responses/ErrorContent'
          description: Unprocessable Content
  /api/v1/optimization/plans/{plan_id}:
    get:
      tags:
      - optimization
      summary: Получить асинхронный план по ID
      description: Возвращает результат расчета, ранее завершенного через `/optimization/tasks`.
      operationId: get_optimization_plan_api_v1_optimization_plans__plan_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: plan_id
        in: path
        required: true
        schema:
          type: string
          title: Plan Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationPlanResponse'
        '401':
          description: Пользователь не аутентифицирован.
        '404':
          $ref: '#/components/responses/ErrorContent'
          description: Not Found
        '422':
          $ref: '#/components/responses/ErrorContent'
          description: Unprocessable Content
components:
  schemas:
    AvailableBudgetEstimateRequest:
      properties:
        horizon_months:
          type: integer
          maximum: 240.0
          minimum: 1.0
          title: Horizon Months
          description: Горизонт планирования в месяцах.
        monthly_income:
          type: number
          minimum: 0.0
          title: Monthly Income
          description: Средний месячный доход пользователя.
        mandatory_expenses:
          type: number
          minimum: 0.0
          title: Mandatory Expenses
          description: Обязательные ежемесячные расходы.
        variable_expenses:
          type: number
          minimum: 0.0
          title: Variable Expenses
          description: Прочие переменные ежемесячные расходы.
          default: 0
        safety_buffer_pct:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Safety Buffer Pct
          description: Доля защитного буфера (0..1), не направляемая в погашение.
          default: 0.1
      type: object
      required:
      - horizon_months
      - monthly_income
      - mandatory_expenses
      title: AvailableBudgetEstimateRequest
    AvailableBudgetEstimateResponse:
      properties:
        monthly_available_budget:
          type: number
          title: Monthly Available Budget
        scenario_profile:
          $ref: '#/components/schemas/ScenarioProfileResponse'
      type: object
      required:
      - monthly_available_budget
      - scenario_profile
      title: AvailableBudgetEstimateResponse
    CreateOptimizationTaskRequest:
      properties:
        input_mode:
          type: string
          enum:
          - scenario_snapshot
          - dataset_instance
          title: Input Mode
          description: Источник входных данных для фоновой задачи.
          default: scenario_snapshot
        instance_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Instance Name
          description: Имя `.dat` инстанса. Обязательно для `dataset_instance`.
        horizon_months:
          anyOf:
          - type: integer
            maximum: 360.0
            minimum: 1.0
          - type: 'null'
          title: Horizon Months
          description: 'Горизонт планирования. Для dataset mode можно не передавать:
            будет использован горизонт инстанса.'
        ru_mode:
          type: boolean
          title: Ru Mode
          description: Если true, применяются правила RU-режима.
          default: true
        mc_income:
          type: boolean
          title: Mc Income
          description: Если true, в фоне будет рассчитан Monte Carlo summary.
          default: false
        mc_config:
          anyOf:
          - $ref: '#/components/schemas/OptimizationMonteCarloConfig'
          - type: 'null'
          description: Параметры Monte Carlo для фонового расчета.
      type: object
      title: CreateOptimizationTaskRequest
    CreateOptimizationTaskResponse:
      properties:
        task_id:
          type: string
          title: Task Id
          description: Идентификатор асинхронной задачи.
        status:
          type: string
          const: pending
          title: Status
          default: pending
        input_mode:
          type: string
          enum:
          - scenario_snapshot
          - dataset_instance
          title: Input Mode
          description: Режим входных данных задачи.
        horizon_months:
          type: integer
          title: Horizon Months
          description: Фактический горизонт задачи.
        instance_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Instance Name
          description: Имя dataset-инстанса, если задача создана в `dataset_instance`
            режиме.
        ru_mode:
          type: boolean
          title: Ru Mode
          description: RU-режим, зафиксированный в задаче.
        mc_income:
          type: boolean
          title: Mc Income
          description: MC-режим, зафиксированный в задаче.
      type: object
      required:
      - task_id
      - input_mode
      - horizon_months
      - ru_mode
      - mc_income
      title: CreateOptimizationTaskResponse
    DashboardKpis:
      properties:
        total_principal:
          type: number
          title: Total Principal
        monthly_required_payment:
          type: number
          title: Monthly Required Payment
        active_debts:
          type: integer
          title: Active Debts
        last_run_status:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Run Status
      type: object
      required:
      - total_principal
      - monthly_required_payment
      - active_debts
      title: DashboardKpis
    DashboardResponse:
      properties:
        kpis:
          $ref: '#/components/schemas/DashboardKpis'
        debts:
          items:
            $ref: '#/components/schemas/DebtRead'
          type: array
          title: Debts
        baseline_reference:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Baseline Reference
        last_optimization:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Last Optimization
        scenario:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Scenario
      type: object
      required:
      - kpis
      - debts
      title: DashboardResponse
    DatasetInstanceCatalogResponse:
      properties:
        total:
          type: integer
          title: Total
          description: Сколько инстансов доступно в каталоге.
        items:
          items:
            $ref: '#/components/schemas/DatasetInstanceSummaryResponse'
          type: array
          title: Items
      type: object
      required:
      - total
      title: DatasetInstanceCatalogResponse
    DatasetInstanceSummaryResponse:
      properties:
        name:
          type: string
          title: Name
          description: Уникальный код dataset-инстанса.
        loans_count:
          type: integer
          title: Loans Count
          description: Количество долгов в инстансе.
        horizon_months:
          type: integer
          title: Horizon Months
          description: Горизонт инстанса в месяцах.
        n_cars:
          type: integer
          title: N Cars
          description: Количество автокредитов.
        n_houses:
          type: integer
          title: N Houses
          description: Количество ипотек.
        n_credit_cards:
          type: integer
          title: N Credit Cards
          description: Количество кредитных карт.
        n_bank_loans:
          type: integer
          title: N Bank Loans
          description: Количество банковских займов.
      type: object
      required:
      - name
