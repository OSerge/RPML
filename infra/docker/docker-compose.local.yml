name: rpml-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rpml
      POSTGRES_PASSWORD: rpml
      POSTGRES_DB: rpml
    ports:
      - "5432:5432"
    volumes:
      - rpml_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpml -d rpml"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  rpml_pg_data:
